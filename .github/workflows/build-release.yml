name: Build Release

on:
  workflow_dispatch:

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from pubspec.yaml
        id: version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo "$RAW" | cut -d'+' -f1)
          BUILD=$(echo "$RAW" | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "Version: $VERSION+$BUILD"

  build-android:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/fluxlyn-release.jks
          echo "ANDROID_KEYSTORE_PATH=$(realpath android/app/fluxlyn-release.jks)" >> $GITHUB_ENV

      - name: Build Android APK
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: flutter build apk --release

      - name: Rename and upload artifact
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            fluxlyn-v${{ needs.extract-version.outputs.version }}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: fluxlyn-v${{ needs.extract-version.outputs.version }}-android
          path: fluxlyn-v${{ needs.extract-version.outputs.version }}-android.apk

  build-windows:
    needs: extract-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package and upload artifact
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath fluxlyn-v${{ needs.extract-version.outputs.version }}-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: fluxlyn-v${{ needs.extract-version.outputs.version }}-windows
          path: fluxlyn-v${{ needs.extract-version.outputs.version }}-windows.zip

  build-linux:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libblkid-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package and upload artifact
        run: |
          tar -czf fluxlyn-v${{ needs.extract-version.outputs.version }}-linux.tar.gz \
            -C build/linux/x64/release bundle

      - uses: actions/upload-artifact@v4
        with:
          name: fluxlyn-v${{ needs.extract-version.outputs.version }}-linux
          path: fluxlyn-v${{ needs.extract-version.outputs.version }}-linux.tar.gz
